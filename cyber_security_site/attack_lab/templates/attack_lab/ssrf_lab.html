{% extends 'base.html' %}
{% block content %}

<h2>SSRF Lab</h2>

<form method="post">
    {% csrf_token %}

    <input name="url" placeholder="http://example.com">

    <button type="submit">Fetch</button>
</form>

{% if response %}
<h3>Response</h3>
<pre>{{ response }}</pre>
{% endif %}

{% endblock %}
