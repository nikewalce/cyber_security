{% extends 'base.html' %}

{% block content %}
<h2>Reflected XSS Lab</h2>

<form method="get">
    <input type="text" name="q" placeholder="Search...">

    <select name="mode">
        <option value="safe">Safe mode</option>
        <option value="unsafe">Unsafe mode</option>
    </select>

    <button type="submit">Search</button>
</form>

<hr>

{% if query %}

<h3>Result:</h3>

{% if mode == "unsafe" %}
    <!-- intentionally unsafe -->
    {{ query|safe }}
{% else %}
    {{ query }}
{% endif %}

{% endif %}

{% endblock %}
