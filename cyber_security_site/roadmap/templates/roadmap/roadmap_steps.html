{% extends "base.html" %}

{% block content %}


<h1>{{ roadmap.title }}</h1>

<p>{{ roadmap.description }}</p>

<ul>
{% for step in roadmap_steps %}
<li>

<a href="{% url 'roadmap_step_detail' roadmap.slug step.slug %}">

{{ step.order }}. {{ step.title }}

</a>

</li>
{% endfor %}
</ul>

{% endblock %}
